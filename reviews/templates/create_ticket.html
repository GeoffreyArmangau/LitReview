{% extends 'base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/create_ticket.css' %}">
{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Créer un ticket</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.title.label_tag }}
        {{ form.title }}
        {{ form.description.label_tag }}
        {{ form.description }}
        <div class="file-upload-wrapper">
            <label for="id_image" class="button-radius file-upload-label">Télécharger une image</label>
            {{ form.image }}
        </div>
        <button type="submit" class="button-radius">Envoyer</button>
    </form>
</div>
{% endblock %}
